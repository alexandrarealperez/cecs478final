name: CI

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make libpcap-dev python3 python3-pip
          pip3 install scapy matplotlib

      - name: Build
        run: make build

      - name: Run tests
        run: make test

      - name: Coverage summary
        run: echo "Coverage summary: build and shell test coverage completed"